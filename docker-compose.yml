# Kyndral-365 monorepo — one command boots the whole product:
#   docker compose up -d
#
# Layout: /              Kyndral app (UI + server + agents)
#         /openproject   the OpenProject FORK (Rails datastore of record) — built from source
#         /agent-runtime the agentic sidecar (FalkorDB graph + reasoning agents)
#
# Services talk over the compose network with FIXED internal hostnames, so the
# cross-system env-var wiring is gone. The only values to supply (in .env):
#   OPENPROJECT_API_KEY        — generate in OpenProject (My Account → Access tokens)
#   OPENPROJECT_WEBHOOK_SECRET — any string; set the same in OP Administration → Webhooks
#   ANTHROPIC_API_KEY          — AI SDK chat route (optional)

services:
  # Kyndral application database
  postgres:
    image: postgres:16
    container_name: kyndral-postgres
    environment:
      POSTGRES_DB: nextera_eto
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # FalkorDB — the ontology graph + agent-runtime world model (replaces Neo4j/Palantir)
  falkordb:
    image: falkordb/falkordb:latest
    container_name: kyndral-falkordb
    ports:
      - "6379:6379"
    volumes:
      - falkordb_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # OpenProject — built from OUR FORK in ./openproject (headless datastore of record)
  openproject:
    build:
      context: ./openproject
      dockerfile: docker/prod/Dockerfile
    container_name: kyndral-openproject
    environment:
      OPENPROJECT_SECRET_KEY_BASE: ${OPENPROJECT_SECRET_KEY_BASE:-change-this-openproject-secret}
      OPENPROJECT_HOST__NAME: ${OPENPROJECT_HOST__NAME:-localhost:8080}
      OPENPROJECT_HTTPS: "false"
      OPENPROJECT_DEFAULT__LANGUAGE: en
      OPENPROJECT_SEED_ADMIN_USER_PASSWORD: ${OPENPROJECT_ADMIN_PASSWORD:-admin}
      DATABASE_URL: postgresql://openproject:${OPENPROJECT_DB_PASSWORD:-openproject}@openproject-db:5432/openproject
    ports:
      - "8080:80"
    depends_on:
      openproject-db:
        condition: service_healthy
    volumes:
      - openproject_data:/var/openproject/assets
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:80/api/v3 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 180s
    restart: unless-stopped

  # OpenProject dedicated PostgreSQL
  openproject-db:
    image: postgres:16
    container_name: kyndral-openproject-db
    environment:
      POSTGRES_DB: openproject
      POSTGRES_USER: openproject
      POSTGRES_PASSWORD: ${OPENPROJECT_DB_PASSWORD:-openproject}
    volumes:
      - openproject_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U openproject"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # Agentic sidecar — syncs OpenProject into FalkorDB, runs the reasoning agents,
  # owns the findings/HITL lifecycle (the /api/agent/* proxy target)
  agent-runtime:
    build: ./agent-runtime
    container_name: kyndral-agent-runtime
    environment:
      OPENPROJECT_BASE_URL: http://openproject:80
      OPENPROJECT_API_KEY: ${OPENPROJECT_API_KEY}
      OPENPROJECT_WEBHOOK_SECRET: ${OPENPROJECT_WEBHOOK_SECRET}
      FALKORDB_HOST: falkordb
      FALKORDB_PORT: "6379"
      PORT: "8745"
      CONSOLE_TOKEN: ${AGENT_RUNTIME_TOKEN:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
    ports:
      - "8745:8745"
    depends_on:
      falkordb:
        condition: service_healthy
      openproject:
        condition: service_started
    restart: unless-stopped

  # Kyndral application server (the only UI users see)
  app:
    build:
      context: .
      dockerfile: Dockerfile.production
    container_name: kyndral-app
    ports:
      - "5000:5000"
    environment:
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD:-password}@postgres:5432/nextera_eto

      # Internal hostnames — fixed by this file, never configured per-environment
      OPENPROJECT_BASE_URL: http://openproject:80
      OPENPROJECT_API_KEY: ${OPENPROJECT_API_KEY}
      OPENPROJECT_WEBHOOK_SECRET: ${OPENPROJECT_WEBHOOK_SECRET}
      AGENT_RUNTIME_URL: http://agent-runtime:8745
      AGENT_RUNTIME_TOKEN: ${AGENT_RUNTIME_TOKEN:-}
      FALKORDB_URL: redis://falkordb:6379
      FALKORDB_HOST: falkordb
      FALKORDB_PORT: "6379"
      FALKORDB_GRAPH: kyndral_ontology

      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      SESSION_SECRET: ${SESSION_SECRET:-change-this-in-production}
      NODE_ENV: ${NODE_ENV:-production}

      # Optional external PM tools (legacy connectors)
      JIRA_DOMAIN: ${JIRA_DOMAIN:-}
      JIRA_EMAIL: ${JIRA_EMAIL:-}
      JIRA_API_TOKEN: ${JIRA_API_TOKEN:-}
    depends_on:
      postgres:
        condition: service_healthy
      falkordb:
        condition: service_healthy
      openproject:
        condition: service_started
    restart: unless-stopped

volumes:
  postgres_data:
  falkordb_data:
  openproject_data:
  openproject_db_data:

networks:
  default:
    name: kyndral-network
