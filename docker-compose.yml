version: '3.8'

services:
  # PostgreSQL Database (existing)
  postgres:
    image: postgres:16
    container_name: nextera-postgres
    environment:
      POSTGRES_DB: nextera_eto
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Neo4j Knowledge Graph (new)
  neo4j:
    image: neo4j:5.15
    container_name: nextera-neo4j
    environment:
      NEO4J_AUTH: neo4j/${NEO4J_PASSWORD:-password}
      NEO4J_PLUGINS: '["apoc", "graph-data-science"]'
      NEO4J_dbms_memory_heap_max__size: 2G
      NEO4J_dbms_memory_pagecache_size: 1G
      NEO4J_dbms_security_procedures_unrestricted: apoc.*,gds.*
      NEO4J_dbms_security_procedures_allowlist: apoc.*,gds.*
    ports:
      - "7474:7474"  # Browser UI
      - "7687:7687"  # Bolt protocol
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
      - neo4j_import:/var/lib/neo4j/import
      - neo4j_plugins:/plugins
    healthcheck:
      test: ["CMD-SHELL", "cypher-shell -u neo4j -p ${NEO4J_PASSWORD:-password} 'RETURN 1'"]
      interval: 30s
      timeout: 10s
      retries: 5

  # OpenProject Headless PPM (API-only, no UI exposed to end users)
  openproject:
    image: openproject/openproject:14-slim
    container_name: nextera-openproject
    environment:
      OPENPROJECT_SECRET_KEY_BASE: ${OPENPROJECT_SECRET_KEY_BASE:-change-this-openproject-secret}
      OPENPROJECT_HOST__NAME: openproject
      OPENPROJECT_HTTPS: "false"
      OPENPROJECT_DEFAULT__LANGUAGE: en
      OPENPROJECT_SEED_ADMIN_USER_PASSWORD: ${OPENPROJECT_ADMIN_PASSWORD:-admin}
      DATABASE_URL: postgresql://openproject:${OPENPROJECT_DB_PASSWORD:-openproject}@openproject-db:5432/openproject
    ports:
      - "8080:80"
    depends_on:
      openproject-db:
        condition: service_healthy
    volumes:
      - openproject_data:/var/openproject/assets
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:80/api/v3 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 120s
    restart: unless-stopped

  # OpenProject dedicated PostgreSQL
  openproject-db:
    image: postgres:16
    container_name: nextera-openproject-db
    environment:
      POSTGRES_DB: openproject
      POSTGRES_USER: openproject
      POSTGRES_PASSWORD: ${OPENPROJECT_DB_PASSWORD:-openproject}
    volumes:
      - openproject_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U openproject"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # Application Server
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: nextera-app
    ports:
      - "5000:5000"
    environment:
      # Database
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD:-password}@postgres:5432/nextera_eto

      # Neo4j
      NEO4J_URI: neo4j://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:-password}

      # Anthropic AI
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}

      # LangChain/LangSmith (for agent observability)
      LANGCHAIN_API_KEY: ${LANGCHAIN_API_KEY}
      LANGCHAIN_PROJECT: ${LANGCHAIN_PROJECT:-nexus-ppm}
      LANGCHAIN_TRACING_V2: ${LANGCHAIN_TRACING_V2:-true}
      LANGCHAIN_ENDPOINT: https://api.smith.langchain.com

      # Session
      SESSION_SECRET: ${SESSION_SECRET:-change-this-in-production}

      # Node Environment
      NODE_ENV: ${NODE_ENV:-production}

      # MCP Adapters (optional - configure as needed)
      JIRA_DOMAIN: ${JIRA_DOMAIN}
      JIRA_EMAIL: ${JIRA_EMAIL}
      JIRA_API_TOKEN: ${JIRA_API_TOKEN}

      AZURE_DEVOPS_ORG: ${AZURE_DEVOPS_ORG}
      AZURE_DEVOPS_PAT: ${AZURE_DEVOPS_PAT}

      # OpenProject Headless PPM
      OPENPROJECT_URL: http://openproject:80
      OPENPROJECT_API_KEY: ${OPENPROJECT_API_KEY}

    depends_on:
      postgres:
        condition: service_healthy
      neo4j:
        condition: service_healthy
      openproject:
        condition: service_healthy
    restart: unless-stopped
    volumes:
      - ./server:/app/server
      - ./client:/app/client
      - ./shared:/app/shared

volumes:
  postgres_data:
    driver: local
  neo4j_data:
    driver: local
  neo4j_logs:
    driver: local
  neo4j_import:
    driver: local
  neo4j_plugins:
    driver: local
  openproject_data:
    driver: local
  openproject_db_data:
    driver: local

networks:
  default:
    name: nextera-network
