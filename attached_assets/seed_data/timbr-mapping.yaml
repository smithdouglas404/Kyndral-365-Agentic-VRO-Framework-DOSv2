# ═══════════════════════════════════════════════════════════════════════════════
# TIMBR.AI MAPPING CONFIGURATION FOR KYNDRYL FABRIC [K360]
# 
# This configuration maps your 105 PostgreSQL tables to the K360 ontology,
# creating a semantic layer that agents can query using SQL or SPARQL.
#
# File: timbr-mapping.yaml
# Version: 1.0
# ═══════════════════════════════════════════════════════════════════════════════

# -----------------------------------------------------------------------------
# TIMBR.AI KNOWLEDGE GRAPH CONFIGURATION
# -----------------------------------------------------------------------------

knowledge_graph:
  name: "k360_enterprise_ontology"
  description: "Kyndryl Fabric K360 Enterprise Transformation Knowledge Graph"
  version: "1.0"
  
  # Connection to your existing PostgreSQL (Neon)
  datasource:
    type: postgresql
    connection:
      host: "${NEON_DATABASE_HOST}"
      port: 5432
      database: "k360_production"
      schema: "public"
      ssl_mode: require
    credentials:
      # Use environment variables or secrets manager
      username: "${DATABASE_USERNAME}"
      password: "${DATABASE_PASSWORD}"
  
  # Import the OWL ontology
  ontology:
    import:
      - file: "k360-complete-ontology.ttl"
        format: turtle
    
    # Base namespace
    namespaces:
      k360: "https://kyndryl.com/k360/ontology#"
      safe: "https://scaledagileframework.com/ontology#"


# ═══════════════════════════════════════════════════════════════════════════════
# SECTION 1: SAFe HIERARCHY MAPPINGS
# ═══════════════════════════════════════════════════════════════════════════════

concept_mappings:

  # ---------------------------------------------------------------------------
  # 1.1 Portfolio
  # ---------------------------------------------------------------------------
  - concept: "safe:Portfolio"
    table: "portfolios"
    primary_key: "id"
    
    properties:
      - property: "rdfs:label"
        column: "name"
      - property: "k360:created_at"
        column: "created_at"
      - property: "k360:updated_at"
        column: "updated_at"
      - property: "k360:valid_from"
        column: "effective_from"
      - property: "k360:valid_to"
        column: "effective_to"

  # ---------------------------------------------------------------------------
  # 1.2 Value Stream
  # ---------------------------------------------------------------------------
  - concept: "safe:ValueStream"
    table: "value_streams"
    primary_key: "id"
    
    properties:
      - property: "rdfs:label"
        column: "name"
      - property: "skos:definition"
        column: "description"
      - property: "k360:created_at"
        column: "created_at"
    
    relationships:
      - property: "safe:belongsToPortfolio"
        target_concept: "safe:Portfolio"
        foreign_key: "portfolio_id"
        target_key: "id"

  # ---------------------------------------------------------------------------
  # 1.3 ART (Agile Release Train)
  # ---------------------------------------------------------------------------
  - concept: "safe:ART"
    table: "arts"
    primary_key: "id"
    
    properties:
      - property: "rdfs:label"
        column: "name"
      - property: "skos:altLabel"
        column: "short_name"
      - property: "k360:created_at"
        column: "created_at"
    
    relationships:
      - property: "safe:belongsToValueStream"
        target_concept: "safe:ValueStream"
        foreign_key: "value_stream_id"
        target_key: "id"

  # ---------------------------------------------------------------------------
  # 1.4 Team
  # ---------------------------------------------------------------------------
  - concept: "safe:Team"
    table: "teams"
    primary_key: "id"
    
    properties:
      - property: "rdfs:label"
        column: "name"
      - property: "k360:teamCapacity"
        column: "capacity"
      - property: "k360:created_at"
        column: "created_at"
    
    relationships:
      - property: "safe:belongsToART"
        target_concept: "safe:ART"
        foreign_key: "art_id"
        target_key: "id"

  # ---------------------------------------------------------------------------
  # 1.5 Division
  # ---------------------------------------------------------------------------
  - concept: "safe:Division"
    table: "divisions"
    primary_key: "id"
    
    properties:
      - property: "rdfs:label"
        column: "name"
      - property: "k360:divisionCode"
        column: "code"

  # ---------------------------------------------------------------------------
  # 1.6 Strategic Theme
  # ---------------------------------------------------------------------------
  - concept: "safe:StrategicTheme"
    table: "strategic_themes"
    primary_key: "id"
    
    properties:
      - property: "rdfs:label"
        column: "name"
      - property: "skos:definition"
        column: "description"
      - property: "k360:themeWeight"
        column: "weight"
    
    relationships:
      - property: "safe:belongsToPortfolio"
        target_concept: "safe:Portfolio"
        foreign_key: "portfolio_id"
        target_key: "id"

  # ---------------------------------------------------------------------------
  # 1.7 Epic
  # ---------------------------------------------------------------------------
  - concept: "safe:Epic"
    table: "epics"
    primary_key: "id"
    
    properties:
      - property: "rdfs:label"
        column: "name"
      - property: "skos:definition"
        column: "description"
      - property: "k360:epicStatus"
        column: "status"
      - property: "k360:epicType"
        column: "type"
      - property: "k360:wsjf"
        column: "wsjf_score"
      - property: "k360:created_at"
        column: "created_at"
      - property: "k360:updated_at"
        column: "updated_at"
    
    relationships:
      - property: "safe:belongsToPortfolio"
        target_concept: "safe:Portfolio"
        foreign_key: "portfolio_id"
        target_key: "id"
      - property: "safe:belongsToValueStream"
        target_concept: "safe:ValueStream"
        foreign_key: "value_stream_id"
        target_key: "id"

  # ---------------------------------------------------------------------------
  # 1.8 Feature
  # ---------------------------------------------------------------------------
  - concept: "safe:Feature"
    table: "features"
    primary_key: "id"
    
    properties:
      - property: "rdfs:label"
        column: "name"
      - property: "skos:definition"
        column: "description"
      - property: "k360:featureStatus"
        column: "status"
      - property: "k360:storyPoints"
        column: "story_points"
    
    relationships:
      - property: "safe:decomposesFrom"
        target_concept: "safe:Epic"
        foreign_key: "epic_id"
        target_key: "id"
      - property: "safe:belongsToPI"
        target_concept: "safe:ProgramIncrement"
        foreign_key: "pi_id"
        target_key: "id"

  # ---------------------------------------------------------------------------
  # 1.9 Story
  # ---------------------------------------------------------------------------
  - concept: "safe:Story"
    table: "stories"
    primary_key: "id"
    
    properties:
      - property: "rdfs:label"
        column: "title"
      - property: "skos:definition"
        column: "description"
      - property: "k360:storyStatus"
        column: "status"
      - property: "k360:storyPoints"
        column: "story_points"
      - property: "k360:acceptanceCriteria"
        column: "acceptance_criteria"
    
    relationships:
      - property: "safe:decomposesFrom"
        target_concept: "safe:Feature"
        foreign_key: "feature_id"
        target_key: "id"
      - property: "safe:belongsToSprint"
        target_concept: "safe:Sprint"
        foreign_key: "sprint_id"
        target_key: "id"
      - property: "safe:assignedToTeam"
        target_concept: "safe:Team"
        foreign_key: "team_id"
        target_key: "id"

  # ---------------------------------------------------------------------------
  # 1.10 Task
  # ---------------------------------------------------------------------------
  - concept: "safe:Task"
    table: "tasks"
    primary_key: "id"
    
    properties:
      - property: "rdfs:label"
        column: "title"
      - property: "k360:taskStatus"
        column: "status"
      - property: "k360:estimatedHours"
        column: "estimated_hours"
      - property: "k360:actualHours"
        column: "actual_hours"
    
    relationships:
      - property: "safe:decomposesFrom"
        target_concept: "safe:Story"
        foreign_key: "story_id"
        target_key: "id"

  # ---------------------------------------------------------------------------
  # 1.11 Program Increment
  # ---------------------------------------------------------------------------
  - concept: "safe:ProgramIncrement"
    table: "program_increments"
    primary_key: "id"
    
    properties:
      - property: "rdfs:label"
        column: "name"
      - property: "k360:piNumber"
        column: "pi_number"
      - property: "k360:valid_from"
        column: "start_date"
      - property: "k360:valid_to"
        column: "end_date"
      - property: "k360:piStatus"
        column: "status"
    
    relationships:
      - property: "safe:belongsToART"
        target_concept: "safe:ART"
        foreign_key: "art_id"
        target_key: "id"

  # ---------------------------------------------------------------------------
  # 1.12 Sprint
  # ---------------------------------------------------------------------------
  - concept: "safe:Sprint"
    table: "sprints"
    primary_key: "id"
    
    properties:
      - property: "rdfs:label"
        column: "name"
      - property: "k360:sprintNumber"
        column: "sprint_number"
      - property: "k360:valid_from"
        column: "start_date"
      - property: "k360:valid_to"
        column: "end_date"
      - property: "k360:sprintGoal"
        column: "goal"
    
    relationships:
      - property: "safe:belongsToPI"
        target_concept: "safe:ProgramIncrement"
        foreign_key: "pi_id"
        target_key: "id"

  # ---------------------------------------------------------------------------
  # 1.13 Milestone
  # ---------------------------------------------------------------------------
  - concept: "safe:Milestone"
    table: "milestones"
    primary_key: "id"
    
    properties:
      - property: "rdfs:label"
        column: "name"
      - property: "k360:milestoneType"
        column: "type"
      - property: "k360:plannedDate"
        column: "planned_date"
      - property: "k360:actualDate"
        column: "actual_date"
      - property: "k360:milestoneStatus"
        column: "status"

  # ---------------------------------------------------------------------------
  # 1.14 Dependency
  # ---------------------------------------------------------------------------
  - concept: "safe:Dependency"
    table: "dependencies"
    primary_key: "id"
    
    properties:
      - property: "k360:dependencyType"
        column: "type"
      - property: "k360:dependencyStatus"
        column: "status"
      - property: "k360:dependencyRisk"
        column: "risk_level"
    
    relationships:
      - property: "k360:sourceWorkItem"
        target_concept: "safe:WorkItem"
        foreign_key: "source_id"
        target_key: "id"
      - property: "k360:targetWorkItem"
        target_concept: "safe:WorkItem"
        foreign_key: "target_id"
        target_key: "id"


# ═══════════════════════════════════════════════════════════════════════════════
# SECTION 2: VRO AGENT DOMAIN MAPPINGS
# ═══════════════════════════════════════════════════════════════════════════════

  # ---------------------------------------------------------------------------
  # 2.1 Investment
  # ---------------------------------------------------------------------------
  - concept: "k360:Investment"
    table: "investments"
    primary_key: "id"
    
    properties:
      - property: "rdfs:label"
        column: "name"
      - property: "k360:roi"
        column: "roi"
        transform: "CAST(roi AS DECIMAL) / 100"  # Convert percentage to decimal
      - property: "k360:npv"
        column: "npv"
      - property: "k360:irr"
        column: "irr"
        transform: "CAST(irr AS DECIMAL) / 100"
      - property: "k360:paybackPeriod"
        column: "payback_months"
      - property: "k360:investmentAmount"
        column: "amount"
      - property: "k360:investmentStatus"
        column: "status"
      - property: "k360:valid_from"
        column: "start_date"
      - property: "k360:valid_to"
        column: "end_date"
    
    relationships:
      - property: "k360:fundsEpic"
        target_concept: "safe:Epic"
        foreign_key: "epic_id"
        target_key: "id"
      - property: "k360:belongsToPortfolio"
        target_concept: "k360:InvestmentPortfolio"
        foreign_key: "portfolio_id"
        target_key: "id"

  # ---------------------------------------------------------------------------
  # 2.2 Benefit
  # ---------------------------------------------------------------------------
  - concept: "k360:Benefit"
    table: "benefits"
    primary_key: "id"
    
    properties:
      - property: "rdfs:label"
        column: "name"
      - property: "k360:benefitTarget"
        column: "target_value"
      - property: "k360:benefitType"
        column: "type"
      - property: "k360:benefitCategory"
        column: "category"
      - property: "k360:measurementUnit"
        column: "unit"
    
    relationships:
      - property: "k360:deliveredBy"
        target_concept: "k360:Investment"
        foreign_key: "investment_id"
        target_key: "id"

  # ---------------------------------------------------------------------------
  # 2.3 Benefit Realization
  # ---------------------------------------------------------------------------
  - concept: "k360:BenefitRealization"
    table: "benefit_realizations"
    primary_key: "id"
    
    properties:
      - property: "k360:benefitActual"
        column: "actual_value"
      - property: "k360:realizationDate"
        column: "measurement_date"
      - property: "k360:variance"
        column: "variance"
        transform: "actual_value - target_value"
    
    relationships:
      - property: "k360:tracksRealizationOf"
        target_concept: "k360:Benefit"
        foreign_key: "benefit_id"
        target_key: "id"

  # ---------------------------------------------------------------------------
  # 2.4 VRO Metrics
  # ---------------------------------------------------------------------------
  - concept: "k360:ValueMetric"
    table: "vro_metrics"
    primary_key: "id"
    
    properties:
      - property: "rdfs:label"
        column: "metric_name"
      - property: "k360:metricValue"
        column: "value"
      - property: "k360:metricTarget"
        column: "target"
      - property: "k360:measurementDate"
        column: "measured_at"


# ═══════════════════════════════════════════════════════════════════════════════
# SECTION 3: PMO AGENT DOMAIN MAPPINGS
# ═══════════════════════════════════════════════════════════════════════════════

  # ---------------------------------------------------------------------------
  # 3.1 Project
  # ---------------------------------------------------------------------------
  - concept: "k360:Project"
    table: "projects"
    primary_key: "id"
    
    properties:
      - property: "rdfs:label"
        column: "name"
      - property: "skos:definition"
        column: "description"
      - property: "k360:projectStatus"
        column: "status"
      - property: "k360:ragStatus"
        column: "rag_status"
      - property: "k360:percentComplete"
        column: "percent_complete"
        transform: "CAST(percent_complete AS DECIMAL) / 100"
      - property: "k360:valid_from"
        column: "start_date"
      - property: "k360:valid_to"
        column: "end_date"
      - property: "k360:plannedEndDate"
        column: "planned_end_date"
      - property: "k360:created_at"
        column: "created_at"
      - property: "k360:updated_at"
        column: "updated_at"
    
    relationships:
      - property: "k360:belongsToDivision"
        target_concept: "safe:Division"
        foreign_key: "division_id"
        target_key: "id"
      - property: "k360:implementsEpic"
        target_concept: "safe:Epic"
        foreign_key: "epic_id"
        target_key: "id"

  # ---------------------------------------------------------------------------
  # 3.2 Program
  # ---------------------------------------------------------------------------
  - concept: "k360:Program"
    table: "programs"
    primary_key: "id"
    
    properties:
      - property: "rdfs:label"
        column: "name"
      - property: "k360:programStatus"
        column: "status"
    
    relationships:
      - property: "k360:containsProject"
        target_concept: "k360:Project"
        join_table: "program_projects"
        source_key: "program_id"
        target_key: "project_id"

  # ---------------------------------------------------------------------------
  # 3.3 Flow Metrics
  # ---------------------------------------------------------------------------
  - concept: "k360:FlowMetric"
    table: "flow_metrics"
    primary_key: "id"
    
    properties:
      - property: "k360:cycleTime"
        column: "cycle_time_days"
      - property: "k360:throughput"
        column: "throughput"
      - property: "k360:wip"
        column: "wip_count"
      - property: "k360:flowEfficiency"
        column: "flow_efficiency"
        transform: "CAST(flow_efficiency AS DECIMAL) / 100"
      - property: "k360:flowLoad"
        column: "flow_load"
      - property: "k360:flowDistribution"
        column: "flow_distribution"
      - property: "k360:flowVelocity"
        column: "flow_velocity"
      - property: "k360:flowPredictability"
        column: "predictability"
      - property: "k360:measurementDate"
        column: "measured_at"
    
    relationships:
      - property: "k360:metricsForTeam"
        target_concept: "safe:Team"
        foreign_key: "team_id"
        target_key: "id"
      - property: "k360:metricsForPI"
        target_concept: "safe:ProgramIncrement"
        foreign_key: "pi_id"
        target_key: "id"

  # ---------------------------------------------------------------------------
  # 3.4 Schedule Variance
  # ---------------------------------------------------------------------------
  - concept: "k360:ScheduleVariance"
    table: "schedule_variances"
    primary_key: "id"
    
    properties:
      - property: "k360:spi"
        column: "spi"
      - property: "k360:sv"
        column: "sv_days"
      - property: "k360:earnedValue"
        column: "earned_value"
      - property: "k360:plannedValue"
        column: "planned_value"
      - property: "k360:measurementDate"
        column: "calculated_at"
    
    relationships:
      - property: "k360:varianceForProject"
        target_concept: "k360:Project"
        foreign_key: "project_id"
        target_key: "id"


# ═══════════════════════════════════════════════════════════════════════════════
# SECTION 4: FINOPS AGENT DOMAIN MAPPINGS
# ═══════════════════════════════════════════════════════════════════════════════

  # ---------------------------------------------------------------------------
  # 4.1 Budget
  # ---------------------------------------------------------------------------
  - concept: "k360:Budget"
    table: "project_financials"
    primary_key: "id"
    
    properties:
      - property: "k360:budgetAmount"
        column: "budget_amount"
      - property: "k360:actualSpend"
        column: "actual_spend"
      - property: "k360:budgetUtilization"
        column: "utilization"
        transform: "CASE WHEN budget_amount > 0 THEN actual_spend / budget_amount ELSE 0 END"
      - property: "k360:cpi"
        column: "cpi"
      - property: "k360:budgetCurrency"
        column: "currency"
      - property: "k360:fiscalYear"
        column: "fiscal_year"
      - property: "k360:fiscalQuarter"
        column: "fiscal_quarter"
    
    relationships:
      - property: "k360:budgetForProject"
        target_concept: "k360:Project"
        foreign_key: "project_id"
        target_key: "id"

  # ---------------------------------------------------------------------------
  # 4.2 Cost Record
  # ---------------------------------------------------------------------------
  - concept: "k360:CostRecord"
    table: "cost_tracking"
    primary_key: "id"
    
    properties:
      - property: "k360:costAmount"
        column: "amount"
      - property: "k360:costDate"
        column: "transaction_date"
      - property: "k360:costDescription"
        column: "description"
      - property: "k360:costType"
        column: "cost_type"
      - property: "k360:vendor"
        column: "vendor_name"
    
    relationships:
      - property: "k360:costForProject"
        target_concept: "k360:Project"
        foreign_key: "project_id"
        target_key: "id"
      - property: "k360:categorizedAs"
        target_concept: "k360:SpendCategory"
        foreign_key: "category_id"
        target_key: "id"

  # ---------------------------------------------------------------------------
  # 4.3 Forecast
  # ---------------------------------------------------------------------------
  - concept: "k360:Forecast"
    table: "financial_forecasts"
    primary_key: "id"
    
    properties:
      - property: "k360:burnRate"
        column: "burn_rate"
      - property: "k360:eac"
        column: "estimate_at_completion"
      - property: "k360:etc"
        column: "estimate_to_complete"
      - property: "k360:forecastDate"
        column: "forecast_date"
      - property: "k360:forecastConfidence"
        column: "confidence"
    
    relationships:
      - property: "k360:forecastForBudget"
        target_concept: "k360:Budget"
        foreign_key: "financial_id"
        target_key: "id"

  # ---------------------------------------------------------------------------
  # 4.4 Spend Category
  # ---------------------------------------------------------------------------
  - concept: "k360:SpendCategory"
    table: "spend_categories"
    primary_key: "id"
    
    properties:
      - property: "rdfs:label"
        column: "name"
      - property: "k360:categoryCode"
        column: "code"
      - property: "k360:parentCategory"
        column: "parent_id"


# ═══════════════════════════════════════════════════════════════════════════════
# SECTION 5: OKR AGENT DOMAIN MAPPINGS
# ═══════════════════════════════════════════════════════════════════════════════

  # ---------------------------------------------------------------------------
  # 5.1 OKR
  # ---------------------------------------------------------------------------
  - concept: "k360:OKR"
    table: "okrs"
    primary_key: "id"
    
    properties:
      - property: "rdfs:label"
        column: "title"
      - property: "k360:okrLevel"
        column: "level"  # company, division, team
      - property: "k360:okrQuarter"
        column: "quarter"
      - property: "k360:okrYear"
        column: "year"
      - property: "k360:okrStatus"
        column: "status"
    
    relationships:
      - property: "k360:cascadesFrom"
        target_concept: "k360:OKR"
        foreign_key: "parent_okr_id"
        target_key: "id"
      - property: "k360:ownedByDivision"
        target_concept: "safe:Division"
        foreign_key: "division_id"
        target_key: "id"

  # ---------------------------------------------------------------------------
  # 5.2 Objective
  # ---------------------------------------------------------------------------
  - concept: "k360:Objective"
    table: "objectives"
    primary_key: "id"
    
    properties:
      - property: "k360:objectiveText"
        column: "description"
      - property: "k360:objectiveWeight"
        column: "weight"
    
    relationships:
      - property: "k360:belongsToOKR"
        target_concept: "k360:OKR"
        foreign_key: "okr_id"
        target_key: "id"

  # ---------------------------------------------------------------------------
  # 5.3 Key Result
  # ---------------------------------------------------------------------------
  - concept: "k360:KeyResult"
    table: "key_results"
    primary_key: "id"
    
    properties:
      - property: "rdfs:label"
        column: "title"
      - property: "k360:keyResultTarget"
        column: "target_value"
      - property: "k360:keyResultActual"
        column: "current_value"
      - property: "k360:keyResultProgress"
        column: "progress"
        transform: "CASE WHEN target_value > 0 THEN current_value / target_value ELSE 0 END"
      - property: "k360:keyResultUnit"
        column: "unit"
      - property: "k360:keyResultStatus"
        column: "status"
    
    relationships:
      - property: "k360:belongsToObjective"
        target_concept: "k360:Objective"
        foreign_key: "objective_id"
        target_key: "id"

  # ---------------------------------------------------------------------------
  # 5.4 Epic-OKR Alignment (Critical for OKR Agent)
  # ---------------------------------------------------------------------------
  - concept: "k360:AlignmentScore"
    table: "epic_okr_alignments"
    primary_key: "id"
    
    properties:
      - property: "k360:alignmentScoreValue"
        column: "alignment_score"
      - property: "k360:alignmentRationale"
        column: "rationale"
      - property: "k360:measurementDate"
        column: "calculated_at"
    
    relationships:
      - property: "k360:alignmentForEpic"
        target_concept: "safe:Epic"
        foreign_key: "epic_id"
        target_key: "id"
      - property: "k360:alignsToOKR"
        target_concept: "k360:OKR"
        foreign_key: "okr_id"
        target_key: "id"


# ═══════════════════════════════════════════════════════════════════════════════
# SECTION 6: GOVERNANCE AGENT DOMAIN MAPPINGS
# ═══════════════════════════════════════════════════════════════════════════════

  # ---------------------------------------------------------------------------
  # 6.1 Policy
  # ---------------------------------------------------------------------------
  - concept: "k360:Policy"
    table: "policies"
    primary_key: "id"
    
    properties:
      - property: "rdfs:label"
        column: "name"
      - property: "skos:definition"
        column: "description"
      - property: "k360:policyStatus"
        column: "status"
      - property: "k360:policyType"
        column: "type"
      - property: "k360:version"
