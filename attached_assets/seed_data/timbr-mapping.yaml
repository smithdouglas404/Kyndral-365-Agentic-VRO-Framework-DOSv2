# ═══════════════════════════════════════════════════════════════════════════════
# SECTION 11: SEMANTIC VIEWS (Computed Concepts)
# ═══════════════════════════════════════════════════════════════════════════════

semantic_views:

  # ---------------------------------------------------------------------------
  # 11.1 Orphaned Projects (No OKR alignment)
  # ---------------------------------------------------------------------------
  - name: "OrphanedProject"
    concept: "k360:OrphanedProject"
    query: |
      SELECT p.id, p.name, p.status
      FROM projects p
      LEFT JOIN epic_okr_alignments eoa ON p.epic_id = eoa.epic_id
      WHERE eoa.id IS NULL
        AND p.status NOT IN ('Completed', 'Cancelled')

  # ---------------------------------------------------------------------------
  # 11.2 Critical Risks (Severity > 0.8, no mitigation)
  # ---------------------------------------------------------------------------
  - name: "UnmitigatedCriticalRisk"
    concept: "k360:CriticalRisk"
    query: |
      SELECT r.id, r.title, r.probability * r.impact as severity
      FROM risks r
      LEFT JOIN risk_mitigations rm ON r.id = rm.risk_id
      WHERE r.probability * r.impact > 0.8
        AND rm.id IS NULL
        AND r.status = 'Open'

  # ---------------------------------------------------------------------------
  # 11.3 Over-Budget Projects
  # ---------------------------------------------------------------------------
  - name: "OverBudgetProject"
    concept: "k360:OverBudgetProject"
    query: |
      SELECT p.id, p.name, pf.actual_spend / pf.budget_amount as utilization
      FROM projects p
      JOIN project_financials pf ON p.id = pf.project_id
      WHERE pf.actual_spend > pf.budget_amount
        AND p.status NOT IN ('Completed', 'Cancelled')

  # ---------------------------------------------------------------------------
  # 11.4 Low Readiness Initiatives
  # ---------------------------------------------------------------------------
  - name: "LowReadinessInitiative"
    concept: "k360:LowReadinessInitiative"
    query: |
      SELECT i.id, i.name, AVG(sr.overall_score) as avg_readiness
      FROM initiatives i
      JOIN stakeholder_readiness sr ON i.id = sr.initiative_id
      GROUP BY i.id, i.name
      HAVING AVG(sr.overall_score) < 0.5

  # ---------------------------------------------------------------------------
  # 11.5 Transformation Fatigue Indicators
  # ---------------------------------------------------------------------------
  - name: "TransformationFatigueIndicator"
    concept: "k360:TransformationFatigue"
    query: |
      SELECT d.id as division_id, d.name as division_name,
             COUNT(CASE WHEN am.velocity < 0 THEN 1 END) as declining_initiatives
      FROM divisions d
      JOIN initiatives i ON i.division_id = d.id
      JOIN adoption_metrics am ON i.id = am.initiative_id
      GROUP BY d.id, d.name
      HAVING COUNT(CASE WHEN am.velocity < 0 THEN 1 END) > 3


# ═══════════════════════════════════════════════════════════════════════════════
# SECTION 12: INFERENCE RULES (For Agent Reasoning)
# ═══════════════════════════════════════════════════════════════════════════════

inference_rules:

  # Rule 1: Budget Alert Trigger
  - name: "BudgetAlertTrigger"
    description: "Alert when budget utilization > 90% and progress < 70%"
    condition: |
      ?budget k360:budgetUtilization ?util .
      ?budget k360:budgetForProject ?project .
      ?project k360:percentComplete ?progress .
      FILTER(?util > 0.9 && ?progress < 0.7)
    action: "CREATE k360:Alert WITH priority='High', source='FinOps'"

  # Rule 2: Cross-Agent Collaboration
  - name: "RiskScheduleCorrelation"
    description: "Initiate A2A when risk correlates with schedule variance"
    condition: |
      ?risk k360:riskSeverity ?severity .
      ?risk k360:riskForProject ?project .
      ?project k360:hasScheduleVariance ?sv .
      ?sv k360:spi ?spi .
      FILTER(?severity > 0.7 && ?spi < 0.9)
    action: "CREATE k360:A2AConversation BETWEEN Governance AND PMO"

  # Rule 3: Benefit Realization Gap
  - name: "BenefitGapDetection"
    description: "Alert VRO when realized benefits < 80% of target"
    condition: |
      ?realization k360:benefitActual ?actual .
      ?realization k360:tracksRealizationOf ?benefit .
      ?benefit k360:benefitTarget ?target .
      FILTER(?actual < ?target * 0.8)
    action: "CREATE k360:Alert WITH priority='High', source='VRO'"


