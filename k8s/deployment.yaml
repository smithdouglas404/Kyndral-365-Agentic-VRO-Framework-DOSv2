# KUBERNETES DEPLOYMENT MANIFEST
# Production-grade configuration with:
# - Auto-scaling
# - Health checks
# - Resource limits
# - Rolling updates
# - Secrets management

apiVersion: v1
kind: Namespace
metadata:
  name: vro-pmo

---
# ConfigMap for non-sensitive configuration
apiVersion: v1
kind: ConfigMap
metadata:
  name: vro-pmo-config
  namespace: vro-pmo
data:
  NODE_ENV: "production"
  PORT: "5000"
  LOG_LEVEL: "info"
  APP_URL: "https://vro-pmo.example.com"

---
# Secret for sensitive data (create separately with real values)
apiVersion: v1
kind: Secret
metadata:
  name: vro-pmo-secrets
  namespace: vro-pmo
type: Opaque
stringData:
  DATABASE_URL: "postgresql://user:password@postgres:5432/vropmo"
  PLANVIEW_API_KEY: "your-planview-api-key"
  PLANVIEW_URL: "https://api.planview.com"
  SLACK_WEBHOOK_URL: "https://hooks.slack.com/services/YOUR/WEBHOOK"
  SLACK_BOT_TOKEN: "xoxb-your-bot-token"
  TEAMS_WEBHOOK_URL: "https://outlook.office.com/webhook/YOUR/WEBHOOK"
  ANTHROPIC_API_KEY: "your-anthropic-api-key"

---
# Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: vro-pmo-api
  namespace: vro-pmo
  labels:
    app: vro-pmo
    component: api
spec:
  replicas: 3  # Start with 3 replicas for high availability
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0  # Zero downtime deployments
  selector:
    matchLabels:
      app: vro-pmo
      component: api
  template:
    metadata:
      labels:
        app: vro-pmo
        component: api
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "5000"
        prometheus.io/path: "/health/metrics"
    spec:
      # Security: Run as non-root
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        fsGroup: 1001

      # Init container to wait for database
      initContainers:
      - name: wait-for-db
        image: busybox:1.35
        command: ['sh', '-c', 'until nc -z postgres 5432; do echo waiting for postgres; sleep 2; done;']

      containers:
      - name: api
        image: vro-pmo:latest  # Replace with your registry
        imagePullPolicy: Always

        ports:
        - name: http
          containerPort: 5000
          protocol: TCP

        # Environment variables from ConfigMap
        envFrom:
        - configMapRef:
            name: vro-pmo-config
        - secretRef:
            name: vro-pmo-secrets

        # Resource limits (CRITICAL for production)
        resources:
          requests:
            memory: "512Mi"
            cpu: "500m"
          limits:
            memory: "2Gi"
            cpu: "2000m"

        # Liveness probe (restart if unhealthy)
        livenessProbe:
          httpGet:
            path: /health/live
            port: http
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          successThreshold: 1
          failureThreshold: 3

        # Readiness probe (remove from load balancer if not ready)
        readinessProbe:
          httpGet:
            path: /health/ready
            port: http
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 3
          successThreshold: 1
          failureThreshold: 3

        # Startup probe (give app time to start)
        startupProbe:
          httpGet:
            path: /health/live
            port: http
          initialDelaySeconds: 0
          periodSeconds: 5
          timeoutSeconds: 3
          successThreshold: 1
          failureThreshold: 30  # 150 seconds max startup time

        # Volume mounts for persistent data
        volumeMounts:
        - name: uploads
          mountPath: /app/uploads
        - name: logs
          mountPath: /app/logs

      # Volumes
      volumes:
      - name: uploads
        persistentVolumeClaim:
          claimName: vro-pmo-uploads
      - name: logs
        emptyDir: {}

      # Pod anti-affinity (spread across nodes)
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                - key: app
                  operator: In
                  values:
                  - vro-pmo
              topologyKey: kubernetes.io/hostname

---
# Service (Load Balancer)
apiVersion: v1
kind: Service
metadata:
  name: vro-pmo-api
  namespace: vro-pmo
  labels:
    app: vro-pmo
    component: api
spec:
  type: LoadBalancer
  selector:
    app: vro-pmo
    component: api
  ports:
  - name: http
    port: 80
    targetPort: http
    protocol: TCP
  sessionAffinity: ClientIP
  sessionAffinityConfig:
    clientIP:
      timeoutSeconds: 3600

---
# Horizontal Pod Autoscaler
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: vro-pmo-api-hpa
  namespace: vro-pmo
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: vro-pmo-api
  minReplicas: 3
  maxReplicas: 20
  metrics:
  # Scale based on CPU usage
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  # Scale based on memory usage
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300  # Wait 5 minutes before scaling down
      policies:
      - type: Percent
        value: 50
        periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 0  # Scale up immediately
      policies:
      - type: Percent
        value: 100
        periodSeconds: 30
      - type: Pods
        value: 2
        periodSeconds: 30

---
# PersistentVolumeClaim for uploads
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: vro-pmo-uploads
  namespace: vro-pmo
spec:
  accessModes:
  - ReadWriteMany  # Multiple pods can access
  resources:
    requests:
      storage: 10Gi
  storageClassName: standard

---
# Ingress (HTTPS with cert-manager)
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: vro-pmo-ingress
  namespace: vro-pmo
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    nginx.ingress.kubernetes.io/rate-limit: "100"  # Rate limiting
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"  # Allow large file uploads
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
spec:
  ingressClassName: nginx
  tls:
  - hosts:
    - vro-pmo.example.com
    secretName: vro-pmo-tls
  rules:
  - host: vro-pmo.example.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: vro-pmo-api
            port:
              number: 80

---
# NetworkPolicy (security)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: vro-pmo-network-policy
  namespace: vro-pmo
spec:
  podSelector:
    matchLabels:
      app: vro-pmo
  policyTypes:
  - Ingress
  - Egress
  ingress:
  # Allow traffic from ingress controller
  - from:
    - namespaceSelector:
        matchLabels:
          name: ingress-nginx
    ports:
    - protocol: TCP
      port: 5000
  egress:
  # Allow DNS
  - to:
    - namespaceSelector: {}
    ports:
    - protocol: UDP
      port: 53
  # Allow database
  - to:
    - podSelector:
        matchLabels:
          app: postgres
    ports:
    - protocol: TCP
      port: 5432
  # Allow HTTPS egress (for external APIs)
  - to:
    - namespaceSelector: {}
    ports:
    - protocol: TCP
      port: 443
